<!DOCTYPE html>
<html>
<head>
  <title>Team Task Manager</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Team Task Manager</h1>
</header>

<div class="container">

  <!-- Login -->
  <div class="card" id="loginCard">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Enter Username">
    <select id="role">
      <option value="admin">Admin</option>
      <option value="member">Member</option>
    </select>
    <button onclick="login()">Login</button>
  </div>

  <!-- Dashboard -->
  <div class="card hidden" id="dashboard">
    <h2>Dashboard</h2>
    <p>Total: <span id="total">7</span></p>
    <p>Completed: <span id="completed">3</span></p>
    <p>Pending: <span id="pending">4</span></p>
  </div>

  <!-- Add Task -->
  <div class="card hidden" id="taskForm">
    <h2>Add Task</h2>
    <input type="text" id="taskInput" placeholder="Enter Task">
    <button onclick="addTask()">Add</button>
  </div>

  <!-- Task List -->
  <div class="card hidden" id="taskSection">
    <h2>Tasks</h2>
    <ul id="taskList">
    </ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
